services:
  postgres:
    image: postgres:16
    container_name: cinema-postgres
    environment:
      POSTGRES_DB: cinema
      POSTGRES_USER: cinema
      POSTGRES_PASSWORD: cinema
    volumes:
      - cinema_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema -d cinema"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cinema-network

  cinema-app:
    image: cinema-quarkus:1.0
    container_name: cinema-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUARKUS_PROFILE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cinema
      DB_USERNAME: cinema
      DB_PASSWORD: cinema
    expose:
      - "8080"
    networks:
      - cinema-network

  nginx:
    image: nginx:1.27
    container_name: cinema-nginx
    depends_on:
      - cinema-app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - cinema-network

volumes:
  cinema_postgres_data:

networks:
  cinema-network:
    driver: bridge