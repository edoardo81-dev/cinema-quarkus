quarkus.http.port=8080
quarkus.devservices.enabled=false

mp.jwt.verify.issuer=cinema-quarkus
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem

quarkus.http.auth.permission.public.paths=/api/public/*,/api/public/*/*,/api/public/*/*/*,/api/auth/*
quarkus.http.auth.permission.public.policy=permit

quarkus.http.auth.permission.admin.paths=/api/admin/*,/api/admin/*/*,/api/admin/*/*/*
quarkus.http.auth.permission.admin.policy=authenticated

smallrye.jwt.path.groups=groups

%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=sa
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:cinema;DB_CLOSE_DELAY=-1
%dev.quarkus.log.category."io.ebean.SQL".level=DEBUG
%dev.quarkus.log.category."io.ebean.TXN".level=DEBUG

%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USERNAME:cinema}
%prod.quarkus.datasource.password=${DB_PASSWORD:cinema}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cinema}

%prod.quarkus.http.proxy.proxy-address-forwarding=true
%prod.quarkus.http.proxy.allow-forwarded=true